services:
  db:
    image: postgres:15
    container_name: de_postgres_db
    restart: always
    environment:
      POSTGRES_USER: dimasartakov
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: finance_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: finance_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://dimasartakov:secretpassword@db:5432/finance_db

volumes:
  postgres_data: